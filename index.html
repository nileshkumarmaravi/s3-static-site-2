<!DOCTYPE html>
<html>
<head>
  <title>My Web Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
    }
    .product {
      background: white;
      margin: 10px;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }
    #cart {
      position: fixed;
      right: 10px;
      top: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<header>
  <h1>My Web Store 🛍️</h1>
</header>

<div id="cart">
  🛒 Items: <span id="count">0</span><br>
  💰 Total: ₹<span id="total">0</span>
</div>

<div class="container" id="products"></div>

<script>
  const products = [
    { name: "Laptop", price: 50000 },
    { name: "Phone", price: 20000 },
    { name: "Headphones", price: 2000 },
    { name: "Keyboard", price: 1500 }
  ];

  let cartCount = 0;
  let total = 0;

  function renderProducts() {
    const container = document.getElementById("products");
    products.forEach((p, index) => {
      container.innerHTML += `
        <div class="product">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${index})">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart(index) {
    cartCount++;
    total += products[index].price;

    document.getElementById("count").innerText = cartCount;
    document.getElementById("total").innerText = total;
  }

  renderProducts();
</script>

</body>
</html>
