<!DOCTYPE html>
<html>
<head>
  <title>My Web Store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .product:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .product h3 {
      margin-bottom: 10px;
    }

    .product p {
      margin-bottom: 15px;
      font-size: 18px;
    }

    button {
      background: #ff7b00;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff5500;
      transform: scale(1.1);
    }

    #cart {
      position: fixed;
      right: 20px;
      top: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      font-size: 14px;
    }
  </style>

</head>

<body>

<header>
  🛍️ My Stylish Store
</header>

<div id="cart">
  🛒 Items: <span id="count">0</span><br>
  💰 Total: ₹<span id="total">0</span>
</div>

<div class="container" id="products"></div>

<script>
  const products = [
    { name: "Laptop", price: 50000 },
    { name: "Phone", price: 20000 },
    { name: "Headphones", price: 2000 },
    { name: "Keyboard", price: 1500 }
  ];

  let cartCount = 0;
  let total = 0;

  function renderProducts() {
    const container = document.getElementById("products");
    products.forEach((p, index) => {
      container.innerHTML += `
        <div class="product">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${index})">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart(index) {
    cartCount++;
    total += products[index].price;

    document.getElementById("count").innerText = cartCount;
    document.getElementById("total").innerText = total;
  }

  renderProducts();
</script>

</body>
</html>
